name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore MapAccessibility.slnx
      - name: Build
        run: dotnet build MapAccessibility.slnx -c Release --no-restore
      - name: Test
        run: dotnet test MapAccessibility.slnx -c Release --no-build --verbosity normal
